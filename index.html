<!doctype html>
<html lang="en">
  <head>
    <!--Note: Vite does not use the %PUBLIC_URL% variable used in Create React App projects. 
    Always reference public assets using a root absolute path (starting with /).
    
    In a Vite React project, using a root absolute path (starting with /) in your code 
    or HTML references files directly from the public folder in your project's root directory. 
    Files in the public directory are served at the root path during development and copied to 
    the root of the build folder, so public/image.png is referenced as /image.png. 

    https://www.google.com/search?q=root+absolute+path+in+vite+react+implies+you+are+searching+in+the+public+folder+in+the+root+directory%3F&rlz=1C1VDKB_enUS1201US1201&oq=root+absolute+path+in+vite+react+implies+you+are+searching+in+the+public+folder+in+the+root+directory%3F&gs_lcrp=EgZjaHJvbWUyBggAEEUYOTIHCAEQIRiPAjIHCAIQIRiPAtIBCTIxNzI5ajBqN6gCALACAA&sourceid=chrome&ie=UTF-8
    -->

    <link rel="icon" href="/favicon_avatar.png" />
  </head>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
